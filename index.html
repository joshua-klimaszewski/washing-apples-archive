<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>washington apples archive</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          Helvetica,
          Arial,
          sans-serif;
        background: #fff;
        color: #000;
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }

      h1 {
        font-family: Impact, "Arial Narrow", Arial, sans-serif;
        font-size: clamp(3rem, 10vw, 6.5rem);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -1px;
        line-height: 1;
        margin-bottom: 10px;
      }

      .subtitle {
        font-size: 0.95rem;
        color: #555;
        margin-bottom: 40px;
      }

      /* ── SESSIONS ──────────────────────────────────────── */

      .sessions {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .session {
        border: 2px solid #000;
      }

      .session-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        cursor: pointer;
        user-select: none;
        gap: 16px;
      }

      .session-header:hover {
        background: #f5f5f5;
      }

      .session-title {
        font-weight: 900;
        font-size: clamp(1rem, 2.5vw, 1.35rem);
        text-transform: uppercase;
        letter-spacing: 0.3px;
        flex: 1;
      }

      .session-right {
        display: flex;
        align-items: center;
        gap: 18px;
        font-size: 0.82rem;
        color: #555;
        flex-shrink: 0;
        white-space: nowrap;
      }

      .session[data-open="true"] .session-total {
        display: none;
      }

      .session-toggle {
        color: #000;
        font-weight: 600;
        font-size: 0.82rem;
      }

      /* ── TRACK LIST ────────────────────────────────────── */

      .session-tracks {
        border-top: 2px solid #000;
      }

      .session[data-open="false"] .session-tracks {
        display: none;
      }

      .track-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 9px 20px;
        border-bottom: 1px solid #ddd;
      }

      .track-row:last-child {
        border-bottom: none;
      }

      .track-row:hover {
        background: #fafafa;
      }

      .track-name {
        flex: 1;
        font-size: 0.93rem;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .track-duration {
        font-size: 0.8rem;
        color: #666;
        min-width: 62px;
        text-align: right;
        flex-shrink: 0;
      }

      /* play button */
      .play-btn {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition:
          background 0.1s,
          color 0.1s;
        padding: 0;
      }

      .play-btn svg {
        display: block;
      }

      .play-btn:hover,
      .play-btn.active {
        background: #000;
        color: #fff;
      }

      /* scrubber */
      .scrubber-wrap {
        flex: 1;
        max-width: 260px;
        display: flex;
        align-items: center;
      }

      input[type="range"].scrubber {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 3px;
        background: #ccc;
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }

      input[type="range"].scrubber::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #000;
        cursor: pointer;
      }

      input[type="range"].scrubber::-moz-range-thumb {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #000;
        border: none;
        cursor: pointer;
      }

      .time-display {
        font-size: 0.72rem;
        color: #666;
        white-space: nowrap;
        min-width: 86px;
        text-align: right;
        flex-shrink: 0;
      }

      /* ── FOOTER ────────────────────────────────────────── */

      footer {
        margin-top: 64px;
        text-align: center;
        font-size: 0.78rem;
        color: #aaa;
      }

      /* ── RESPONSIVE ────────────────────────────────────── */

      @media (max-width: 580px) {
        .track-duration {
          display: none;
        }
        .scrubber-wrap {
          max-width: 100px;
        }
        .time-display {
          min-width: 72px;
          font-size: 0.68rem;
        }
        .session-right .session-total {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <h1>washington apples archive</h1>

    <div class="sessions" id="sessions"></div>

    <audio id="player" preload="none"></audio>

    <footer>
      <p>&copy; 2026 Washington Apples</p>
    </footer>

    <script>
      (function () {
        // ── SESSION DATA ──────────────────────────────────────────────────────────
        // To add a new session: unshift (or push) a new object to SESSIONS.
        // Each session needs: date, name, folder, and a tracks array.
        // Each track needs: title and file (the exact filename in that folder).
        var SESSIONS = [
          {
            date: "MAR 14, 2026",
            name: "JOSH'S BASEMENT",
            folder: "media/3-14-2026",
            tracks: [
              { title: "Goodbye Paychecks", file: "goodbye-paychecks.mp3" },
              { title: "Karoline Leavitt Memorial Day", file: "karoline-leavitt-memorial-day.mp3" },
              { title: "Steak and Ale", file: "steak-and-ale.mp3" },
              { title: "Untitled", file: "untitled.mp3" },
            ],
          },
        ];

        // ── STATE ─────────────────────────────────────────────────────────────────
        var player = document.getElementById("player");
        var activeRow = null; // currently loaded track row element
        var durCache = {}; // "folder/file" -> seconds
        var durCount = {}; // si -> number of durations loaded so far

        // ── HELPERS ───────────────────────────────────────────────────────────────
        function encPath(folder, file) {
          return (
            folder.split("/").map(encodeURIComponent).join("/") +
            "/" +
            encodeURIComponent(file)
          );
        }

        function cacheKey(folder, file) {
          return folder + "/" + file;
        }

        function fmt(s) {
          if (!isFinite(s) || s < 0) return "--:--";
          var m = Math.floor(s / 60),
            ss = Math.floor(s % 60);
          return m + ":" + (ss < 10 ? "0" : "") + ss;
        }

        function fmtMin(s) {
          return isFinite(s) ? fmt(s) + " min" : "\u2014";
        }

        var SVG_PLAY =
          '<svg width="10" height="12" viewBox="0 0 10 12" fill="currentColor"><polygon points="0,0 10,6 0,12"/></svg>';
        var SVG_PAUSE =
          '<svg width="10" height="12" viewBox="0 0 10 12" fill="currentColor"><rect x="0" y="0" width="3.5" height="12"/><rect x="6.5" y="0" width="3.5" height="12"/></svg>';

        // ── RENDER ────────────────────────────────────────────────────────────────
        var container = document.getElementById("sessions");

        SESSIONS.forEach(function (session, si) {
          durCount[si] = 0;

          // Session wrapper
          var secEl = document.createElement("div");
          secEl.className = "session";
          secEl.dataset.open = si === 0 ? "true" : "false";
          secEl.dataset.si = si;

          // Header
          var hdrEl = document.createElement("div");
          hdrEl.className = "session-header";
          hdrEl.setAttribute("role", "button");
          hdrEl.setAttribute("aria-expanded", si === 0 ? "true" : "false");
          hdrEl.innerHTML =
            '<span class="session-title">' +
            session.date +
            " \u2014 " +
            session.name +
            "</span>" +
            '<span class="session-right">' +
            '<span class="session-total" data-si="' +
            si +
            '"></span>' +
            '<span class="session-toggle">' +
            (si === 0
              ? "Hide Tracks \u2227"
              : "View Tracks (" + session.tracks.length + ") \u2228") +
            "</span>" +
            "</span>";
          hdrEl.addEventListener("click", function () {
            toggleSession(secEl, si);
          });

          // Tracks
          var tracksEl = document.createElement("div");
          tracksEl.className = "session-tracks";

          session.tracks.forEach(function (track, ti) {
            var key = cacheKey(session.folder, track.file);

            var rowEl = document.createElement("div");
            rowEl.className = "track-row";
            rowEl.dataset.key = key;
            rowEl.dataset.si = si;
            rowEl.dataset.ti = ti;
            rowEl.innerHTML =
              '<span class="track-name">' +
              track.title +
              "</span>" +
              '<span class="track-duration" data-key="' +
              key +
              '">\u2014</span>' +
              '<button class="play-btn" aria-label="Play ' +
              track.title +
              '">' +
              SVG_PLAY +
              "</button>" +
              '<div class="scrubber-wrap"><input type="range" class="scrubber" min="0" max="1000" value="0" step="1"></div>' +
              '<span class="time-display">0:00 / \u2014</span>';

            rowEl
              .querySelector(".play-btn")
              .addEventListener("click", function (e) {
                e.stopPropagation();
                togglePlay(rowEl, session, track);
              });

            rowEl
              .querySelector(".scrubber")
              .addEventListener("input", function () {
                if (
                  activeRow === rowEl &&
                  isFinite(player.duration) &&
                  player.duration > 0
                ) {
                  player.currentTime = (this.value / 1000) * player.duration;
                }
              });

            tracksEl.appendChild(rowEl);
          });

          secEl.appendChild(hdrEl);
          secEl.appendChild(tracksEl);
          container.appendChild(secEl);
        });

        // ── SESSION TOGGLE ────────────────────────────────────────────────────────
        function toggleSession(secEl, si) {
          var open = secEl.dataset.open === "true";
          var newOpen = !open;
          secEl.dataset.open = newOpen;
          secEl
            .querySelector(".session-header")
            .setAttribute("aria-expanded", newOpen);
          var toggle = secEl.querySelector(".session-toggle");
          var count = SESSIONS[si].tracks.length;
          toggle.textContent = newOpen
            ? "Hide Tracks \u2227"
            : "View Tracks (" + count + ") \u2228";
        }

        // ── PLAY / PAUSE ──────────────────────────────────────────────────────────
        function togglePlay(rowEl, session, track) {
          if (activeRow === rowEl) {
            player.paused ? player.play() : player.pause();
            return;
          }
          if (activeRow) deactivate(activeRow);
          activeRow = rowEl;
          player.src = encPath(session.folder, track.file);
          player.play();
        }

        function deactivate(rowEl) {
          rowEl.querySelector(".play-btn").innerHTML = SVG_PLAY;
          rowEl.querySelector(".play-btn").classList.remove("active");
        }

        // ── PLAYER EVENTS ─────────────────────────────────────────────────────────
        player.addEventListener("play", function () {
          if (!activeRow) return;
          var btn = activeRow.querySelector(".play-btn");
          btn.innerHTML = SVG_PAUSE;
          btn.classList.add("active");
        });

        player.addEventListener("pause", function () {
          if (!activeRow) return;
          var btn = activeRow.querySelector(".play-btn");
          btn.innerHTML = SVG_PLAY;
          btn.classList.remove("active");
        });

        player.addEventListener("timeupdate", function () {
          if (!activeRow || !isFinite(player.duration)) return;
          activeRow.querySelector(".scrubber").value = Math.round(
            (player.currentTime / player.duration) * 1000,
          );
          activeRow.querySelector(".time-display").textContent =
            fmt(player.currentTime) + " / " + fmt(player.duration);
        });

        player.addEventListener("loadedmetadata", function () {
          if (!activeRow) return;
          var key = activeRow.dataset.key;
          if (!durCache[key]) {
            durCache[key] = player.duration;
            refreshDur(key, player.duration);
            tryTotalFor(parseInt(activeRow.dataset.si));
          }
        });

        player.addEventListener("ended", function () {
          if (!activeRow) return;
          deactivate(activeRow);
          var si = parseInt(activeRow.dataset.si);
          var ti = parseInt(activeRow.dataset.ti);
          var session = SESSIONS[si];
          if (ti < session.tracks.length - 1) {
            var next = session.tracks[ti + 1];
            var nextKey = cacheKey(session.folder, next.file);
            var nextRow = container.querySelector(
              '.track-row[data-key="' + nextKey + '"]',
            );
            if (nextRow) {
              activeRow = nextRow;
              player.src = encPath(session.folder, next.file);
              player.play();
              return;
            }
          }
          activeRow = null;
        });

        // ── PRELOAD DURATIONS ─────────────────────────────────────────────────────
        SESSIONS.forEach(function (session, si) {
          session.tracks.forEach(function (track) {
            var key = cacheKey(session.folder, track.file);
            var a = new Audio();
            a.preload = "metadata";
            a.addEventListener("loadedmetadata", function () {
              durCache[key] = a.duration;
              durCount[si]++;
              refreshDur(key, a.duration);
              tryTotalFor(si);
            });
            a.src = encPath(session.folder, track.file);
          });
        });

        function refreshDur(key, dur) {
          document
            .querySelectorAll('.track-duration[data-key="' + key + '"]')
            .forEach(function (el) {
              el.textContent = fmtMin(dur);
            });
          document
            .querySelectorAll('.track-row[data-key="' + key + '"]')
            .forEach(function (rowEl) {
              if (rowEl !== activeRow) {
                rowEl.querySelector(".time-display").textContent =
                  "0:00 / " + fmt(dur);
              }
            });
        }

        function tryTotalFor(si) {
          var session = SESSIONS[si];
          var total = 0;
          var allDone = true;
          session.tracks.forEach(function (track) {
            var v = durCache[cacheKey(session.folder, track.file)];
            if (v) {
              total += v;
            } else {
              allDone = false;
            }
          });
          if (allDone) {
            var el = container.querySelector(
              '.session-total[data-si="' + si + '"]',
            );
            if (el) el.textContent = "Total Time: " + fmtMin(total);
          }
        }
      })();
    </script>
  </body>
</html>
